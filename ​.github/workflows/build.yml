name: FINAL_FORCE_BUILD

on:
  push:
    branches: [ "main", "Main", "Ana" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Kodu Cek
      uses: actions/checkout@v4
    
    - name: 2. Java Kur
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: 3. Gradle'ı SIFIRDAN Kur (Seninkini Kullanma)
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: 4. APK Hazirla
      run: ./gradlew assembleDebug

    - name: 5. APK'yı Disari Aktar
      uses: actions/upload-artifact@v4
      with:
        name: VPN-Uygulamasi-BITTI
        path: app/build/outputs/apk/debug/app-debug.apk
