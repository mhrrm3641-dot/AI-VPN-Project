name: VPN APK Olusturucu

on:
  push:
    branches: [ "Ana", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Kodu Cek
      uses: actions/checkout@v4
    
    - name: Java 17 Kur
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Gradle'ı GitHub'dan Kur ve APK Hazırla
      uses: gradle/actions/setup-gradle@v3
      with:
        arguments: assembleDebug
        # Bu adım, projendeki eksik gradlew dosyasını görmezden gelir.

    - name: APK Dosyasini Yukle
      uses: actions/upload-artifact@v4
      with:
        name: VPN-Uygulamam
        path: app/build/outputs/apk/debug/app-debug.apk
