name: VPN APK Olusturucu

on:
  push:
    branches: [ "Ana", "main" ]
  workflow_dispatch: # Bu satır sayesinde elle de başlatabileceksin

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Java Kurulumu
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Gradle Izni Ver
      run: chmod +x gradlew

    - name: APK Insa Et
      run: ./gradlew assembleDebug

    - name: APK Dosyasini Yukle
      uses: actions/upload-artifact@v4
      with:
        name: VPN-Uygulamam
        path: app/build/outputs/apk/debug/app-debug.apk
